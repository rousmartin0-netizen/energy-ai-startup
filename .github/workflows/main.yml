name: Energy-Bot-Auto

on:
  schedule:
    - cron: '0 * * * *'  # Spustí se každou hodinu
  workflow_dispatch:      # Umožňuje ruční spuštění

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Data
        run: python engine.py

      - name: Commit data
        run: |
          git config --global user.name 'EnergyBot'
          git config --global user.email 'bot@energy.ai'
          git add market_history.csv
          git commit -m "Update market data" || exit 0
          git push
