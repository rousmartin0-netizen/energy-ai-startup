name: Energy-Bot-Auto

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Data
        run: python engine.py

      - name: Commit and Push data
        run: |
          git config --global user.name 'EnergyBot'
          git config --global user.email 'bot@energy.ai'
          
          # Schováme nová data do "kapsy"
          git add market_history.csv
          git stash
          
          # Stáhneme tvoje změny (Telegram token atd.)
          git pull --rebase origin main
          
          # Vyndáme data z kapsy zpět
          git stash pop || echo "No changes to pop"
          
          git add market_history.csv
          git commit -m "Update market data [skip ci]" || exit 0
          git push origin main
