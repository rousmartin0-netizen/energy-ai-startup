name: Energy-Bot-Auto
on:
  schedule:
    - cron: '0 * * * *' # Běží každou hodinu
  workflow_dispatch: # Umožňuje spustit ručně tlačítkem
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests pandas
      - name: Fetch Data
        run: python engine.py
      - name: Commit data
        run: |
          git config --global user.name 'EnergyBot'
          git config --global user.email 'bot@energy.ai'
          git add market_history.csv
          git commit -m "Update market data" || echo "No changes"
          git push
