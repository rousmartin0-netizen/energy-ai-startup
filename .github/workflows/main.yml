name: Energy-Bot-Auto

on:
  schedule:
    - cron: '*/5 * * * *'  # Běží automaticky každých 5 minut
  workflow_dispatch:      # Umožňuje ti tlačítko "Run workflow"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Povolení pro zápis do repozitáře (důležité pro ukládání CSV)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Stáhne celou historii, aby rebase fungoval správně

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Data
        run: python engine.py

      - name: Commit and Push data
        run: |
          git config --global user.name 'EnergyBot'
          git config --global user.email 'bot@energy.ai'
          
          # Klíčová oprava: nejdřív stáhne tvoje ruční změny kódu, pak přidá data
          git pull --rebase origin main
          
          git add market_history.csv
          # Pokud se nic nezměnilo, commit neudělá chybu
          git commit -m "Update market data [skip ci]" || exit 0
          
          git push origin main
